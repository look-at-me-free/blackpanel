<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Wallace Archive Reader · Mobile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Handjet:wght@100..900&family=Rampart+One&family=Rubik+Iso&display=swap" rel="stylesheet">

  <script>
    (function () {
      var isMobile =
        /android|iphone|ipad|ipod|mobile|tablet|silk|kindle|blackberry|opera mini|iemobile/i.test(navigator.userAgent) ||
        window.innerWidth <= 980;

      if (isMobile) return;

      var basePath = window.location.pathname.replace(/\/[^\/]*$/, "/");
      var target = window.location.origin + basePath + "index.html" + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>

  <style>
    :root{
      --bg:#080a10;
      --ink:#f7f8fb;
      --muted:rgba(247,248,251,.74);
      --muted2:rgba(247,248,251,.5);
      --stroke:rgba(255,255,255,.12);
      --panel:rgba(255,255,255,.045);
      --panel2:rgba(255,255,255,.075);
      --shadow:0 18px 48px rgba(0,0,0,.42);
      --radius:20px;
      --title-font:"Rampart One", system-ui, sans-serif;
      --subtitle-font:"Rubik Iso", system-ui, sans-serif;
      --ui-font:"Handjet", system-ui, sans-serif;
      --pill-font:"Handjet", system-ui, sans-serif;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--ink);
      font-family:var(--ui-font);
      scroll-behavior:smooth;
    }

    body{
      background:
        radial-gradient(900px 520px at 12% 0%, rgba(255,255,255,.06), transparent 58%),
        radial-gradient(720px 480px at 88% 10%, rgba(255,255,255,.035), transparent 55%),
        linear-gradient(180deg, #0d1119 0%, #090b11 40%, #080a10 100%);
      overflow-x:hidden;
    }

    a{ color:inherit; text-decoration:none; }
    button, input{ font:inherit; }

    .mobile-shell{
      width:100%;
      max-width:980px;
      margin:0 auto;
      padding:10px 10px 18px;
    }

    .mobile-top{
      position:sticky;
      top:0;
      z-index:5000;
      padding-top:calc(env(safe-area-inset-top, 0px) + 6px);
      margin-bottom:12px;
      background:linear-gradient(180deg, rgba(8,10,16,.92), rgba(8,10,16,.84) 72%, rgba(8,10,16,0));
      backdrop-filter:blur(12px);
    }

    .mobile-card{
      border:1px solid var(--stroke);
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.03));
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .mobile-head{
      padding:14px;
      display:grid;
      gap:12px;
    }

    .mobile-copy{
      display:grid;
      gap:6px;
      text-align:center;
    }

    .mobile-eyebrow{
      margin:0;
      color:var(--muted2);
      font-family:var(--subtitle-font);
      font-size:10px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .mobile-copy h1{
      margin:0;
      font-family:var(--title-font);
      font-size:clamp(1.5rem, 7vw, 2.3rem);
      line-height:1.03;
      font-weight:400;
      letter-spacing:.01em;
      word-break:break-word;
    }

    .mobile-copy p{
      margin:0;
      color:var(--muted);
      font-family:var(--subtitle-font);
      font-size:11px;
      line-height:1.45;
      letter-spacing:.02em;
    }

    .mobile-tools{
      display:grid;
      gap:10px;
    }

    .mobile-search{
      width:100%;
      min-height:48px;
      padding:0 14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.14);
      outline:none;
      background:rgba(0,0,0,.22);
      color:var(--ink);
      font-size:15px;
      line-height:1.2;
    }

    .mobile-search::placeholder{
      color:rgba(247,248,251,.42);
    }

    .mobile-search:focus{
      border-color:rgba(255,255,255,.3);
      box-shadow:0 0 0 4px rgba(255,255,255,.06);
    }

    .mobile-meta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .mobile-stat,
    .mobile-chip{
      min-height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
      color:var(--muted);
      font-size:12px;
      line-height:1;
    }

    .mobile-chip{
      cursor:pointer;
      color:#0f1219;
      background:#fff;
      font-weight:700;
      box-shadow:0 8px 24px rgba(255,255,255,.12);
    }

    .search-results{
      display:grid;
      gap:8px;
      max-height:220px;
      overflow:auto;
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
    }

    .search-result-pill{
      appearance:none;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:var(--ink);
      padding:12px 14px;
      border-radius:14px;
      cursor:pointer;
      font-size:14px;
      line-height:1.2;
      text-align:left;
      font-family:var(--pill-font);
      letter-spacing:.02em;
    }

    .works-shell{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 58px;
      border:1px solid rgba(255,255,255,.1);
      border-radius:18px;
      background:rgba(255,255,255,.035);
      overflow:hidden;
      min-height:320px;
    }

    .works-scroll{
      max-height:420px;
      overflow-y:auto;
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
      padding:10px;
    }

    .works-accordion{
      display:grid;
      gap:8px;
    }

    .works-dial-rail{
      border-left:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px 0;
    }

    .works-dial-slot{
      position:relative;
      width:12px;
      height:90%;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
    }

    .works-dial-knob{
      position:absolute;
      left:50%;
      top:0;
      width:38px;
      height:38px;
      transform:translate(-50%, 0);
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.3), rgba(255,255,255,.08) 45%, rgba(0,0,0,.18) 100%),
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
      box-shadow:
        0 8px 20px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.18);
      cursor:grab;
      touch-action:none;
    }

    .works-dial-knob::before{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
    }

    .works-dial-knob::after{
      content:"";
      position:absolute;
      left:50%;
      top:6px;
      width:2px;
      height:10px;
      transform:translateX(-50%);
      border-radius:999px;
      background:rgba(255,255,255,.7);
    }

    .works-dial-knob.dragging{
      cursor:grabbing;
      box-shadow:
        0 12px 28px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.2);
    }

    .work-block{
      border:1px solid rgba(255,255,255,.1);
      border-radius:16px;
      background:rgba(255,255,255,.04);
      overflow:hidden;
    }

    .work-toggle{
      appearance:none;
      width:100%;
      border:0;
      background:transparent;
      color:var(--ink);
      padding:14px 16px;
      text-align:left;
      font-size:18px;
      line-height:1.1;
      font-family:var(--pill-font);
      letter-spacing:.02em;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      cursor:pointer;
    }

    .work-toggle .caret{
      flex:0 0 auto;
      width:10px;
      height:10px;
      border-right:2px solid rgba(255,255,255,.8);
      border-bottom:2px solid rgba(255,255,255,.8);
      transform:rotate(45deg);
      transition:transform .18s ease;
      margin-top:-4px;
    }

    .work-block.open .work-toggle .caret{
      transform:rotate(225deg);
      margin-top:2px;
    }

    .chapter-list{
      display:none;
      padding:0 10px 10px;
      gap:8px;
    }

    .work-block.open .chapter-list{
      display:grid;
    }

    .chapter-link{
      display:block;
      padding:11px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.05);
      font-size:14px;
      line-height:1.2;
      font-family:var(--pill-font);
      letter-spacing:.02em;
    }

    .chapter-link.current{
      background:#dfe6ff;
      color:#0a0d14;
      border-color:transparent;
    }

    .mobile-bottom-space{
      height:16px;
    }

    @media (min-width:700px){
      .mobile-shell{
        padding-left:14px;
        padding-right:14px;
      }
    }
  </style>
</head>
<body data-reader-mode="mobile">
  <div class="mobile-shell">
    <header class="mobile-top">
      <div class="mobile-card">
        <div class="mobile-head">
          <div class="mobile-copy">
            <p class="mobile-eyebrow">Archive Reader</p>
            <h1 id="workTitle">Wallace Archive</h1>
            <p>Browse by title. Scroll the list. Open what you want.</p>
          </div>

          <div class="mobile-tools">
            <input
              id="chapterSearchInput"
              class="mobile-search"
              type="search"
              placeholder="Search works and chapters…"
              autocomplete="off"
            />

            <div class="mobile-meta">
              <div class="mobile-stat" id="chapterSearchStat">Type to search</div>
              <button class="mobile-chip" id="scrollToWorksBtn" type="button">To Works</button>
            </div>

            <div class="search-results" id="chapterSearchResults"></div>

            <div class="works-shell" id="worksShell">
              <div class="works-scroll" id="worksScroll">
                <div class="works-accordion" id="worksAccordion"></div>
              </div>

              <div class="works-dial-rail">
                <div class="works-dial-slot" id="worksDialSlot">
                  <div class="works-dial-knob" id="worksDialKnob"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="mobile-bottom-space"></div>
  </div>

  <script>
    (() => {
      "use strict";

      const LIBRARY_FILE = "library.json";

      function normalizeKey(value) {
        return String(value ?? "").trim().toLowerCase();
      }

      function titleCaseSlug(slug) {
        return String(slug ?? "")
          .replace(/[_-]+/g, " ")
          .replace(/\s+/g, " ")
          .trim()
          .replace(/\b\w/g, ch => ch.toUpperCase());
      }

      function getQueryState() {
        const url = new URL(window.location.href);
        return {
          dir: url.searchParams.get("dir") || "",
          file: url.searchParams.get("file") || ""
        };
      }

      function mobileHref(dir, file) {
        const basePath = window.location.pathname.replace(/\/[^\/]*$/, "/");
        const href = new URL(window.location.origin + basePath + "mobile.html");
        href.searchParams.set("dir", dir);
        href.searchParams.set("file", file);
        return href.toString();
      }

      function clearSearchResultsIfEmpty() {
        const input = document.getElementById("chapterSearchInput");
        const results = document.getElementById("chapterSearchResults");
        const stat = document.getElementById("chapterSearchStat");

        if (!input || !results || !stat) return;

        if (!input.value.trim()) {
          results.innerHTML = "";
          stat.textContent = "Type to search";
        }
      }

      function wireWorksDial() {
        const worksScroll = document.getElementById("worksScroll");
        const slot = document.getElementById("worksDialSlot");
        const knob = document.getElementById("worksDialKnob");

        if (!worksScroll || !slot || !knob) return;

        let dragging = false;
        let startY = 0;
        let startTop = 0;

        function getMaxKnobTop() {
          return Math.max(0, slot.clientHeight - knob.offsetHeight);
        }

        function syncKnobToScroll() {
          const maxScroll = worksScroll.scrollHeight - worksScroll.clientHeight;
          const maxKnobTop = getMaxKnobTop();

          if (maxScroll <= 0) {
            knob.style.top = "0px";
            return;
          }

          const ratio = worksScroll.scrollTop / maxScroll;
          knob.style.top = `${ratio * maxKnobTop}px`;
        }

        function syncScrollToKnob(topPx) {
          const maxKnobTop = getMaxKnobTop();
          const maxScroll = worksScroll.scrollHeight - worksScroll.clientHeight;

          if (maxKnobTop <= 0 || maxScroll <= 0) {
            worksScroll.scrollTop = 0;
            return;
          }

          const clamped = Math.max(0, Math.min(maxKnobTop, topPx));
          const ratio = clamped / maxKnobTop;
          worksScroll.scrollTop = ratio * maxScroll;
        }

        worksScroll.addEventListener("scroll", syncKnobToScroll, { passive: true });
        window.addEventListener("resize", syncKnobToScroll);

        knob.addEventListener("pointerdown", (e) => {
          dragging = true;
          startY = e.clientY;
          startTop = parseFloat(knob.style.top || "0") || 0;
          knob.classList.add("dragging");
          knob.setPointerCapture(e.pointerId);
          e.preventDefault();
        });

        knob.addEventListener("pointermove", (e) => {
          if (!dragging) return;
          const delta = e.clientY - startY;
          syncScrollToKnob(startTop + delta);
        });

        function stopDrag(e) {
          if (!dragging) return;
          dragging = false;
          knob.classList.remove("dragging");
          if (e?.pointerId != null) {
            try { knob.releasePointerCapture(e.pointerId); } catch {}
          }
        }

        knob.addEventListener("pointerup", stopDrag);
        knob.addEventListener("pointercancel", stopDrag);

        slot.addEventListener("click", (e) => {
          if (e.target === knob) return;

          const rect = slot.getBoundingClientRect();
          const desiredTop = e.clientY - rect.top - knob.offsetHeight / 2;
          syncScrollToKnob(desiredTop);
        });

        syncKnobToScroll();
      }

      function renderSearchResults(works, query) {
        const results = document.getElementById("chapterSearchResults");
        const stat = document.getElementById("chapterSearchStat");
        if (!results || !stat) return;

        const q = normalizeKey(query);
        if (!q) {
          results.innerHTML = "";
          stat.textContent = "Type to search";
          return;
        }

        const rows = [];
        for (const work of works) {
          for (const entry of work.entries || []) {
            const workLabel = work.display || titleCaseSlug(work.slug);
            const entryLabel = entry.subtitle || titleCaseSlug(entry.slug);
            const key = normalizeKey(`${workLabel} ${entryLabel} ${entry.slug}`);

            if (key.includes(q)) {
              rows.push({
                dir: work.slug,
                file: entry.slug,
                label: `${workLabel} · ${entryLabel}`
              });
            }
          }
        }

        const limited = rows.slice(0, 12);

        if (!limited.length) {
          results.innerHTML = "";
          stat.textContent = "No matches";
          return;
        }

        stat.textContent = `${limited.length} result${limited.length === 1 ? "" : "s"}`;
        results.innerHTML = limited.map(item => `
          <button class="search-result-pill" type="button" data-dir="${item.dir}" data-file="${item.file}">
            ${item.label}
          </button>
        `).join("");
      }

      async function loadAccordion() {
        const host = document.getElementById("worksAccordion");
        const searchInput = document.getElementById("chapterSearchInput");
        const searchResults = document.getElementById("chapterSearchResults");

        if (!host) return;

        const res = await fetch(LIBRARY_FILE, { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to load library.json");

        const data = await res.json();
        const works = Array.isArray(data.works) ? data.works : [];
        const state = getQueryState();

        let html = "";

        for (const work of works) {
          const workLabel = work.display || titleCaseSlug(work.slug);
          const isCurrentWork = normalizeKey(work.slug) === normalizeKey(state.dir);

          html += `
            <section class="work-block">
              <button class="work-toggle" type="button">
                <span>${workLabel}</span>
                <span class="caret"></span>
              </button>
              <div class="chapter-list">
          `;

          for (const entry of work.entries || []) {
            const entryLabel = entry.subtitle || titleCaseSlug(entry.slug);
            const isCurrent =
              isCurrentWork && normalizeKey(entry.slug) === normalizeKey(state.file);

            html += `
              <a class="chapter-link${isCurrent ? " current" : ""}" href="${mobileHref(work.slug, entry.slug)}">
                ${workLabel} · ${entryLabel}
              </a>
            `;
          }

          html += `
              </div>
            </section>
          `;
        }

        host.innerHTML = html;

        host.addEventListener("click", (e) => {
          const btn = e.target.closest(".work-toggle");
          if (!btn) return;

          const block = btn.closest(".work-block");
          if (!block) return;

          block.classList.toggle("open");
        });

        if (searchInput) {
          searchInput.addEventListener("input", () => {
            renderSearchResults(works, searchInput.value);
          });
        }

        if (searchResults) {
          searchResults.addEventListener("click", (e) => {
            const btn = e.target.closest("button[data-dir][data-file]");
            if (!btn) return;

            window.location.href = mobileHref(btn.dataset.dir, btn.dataset.file);
          });
        }
      }

      function wireButtons() {
        const toWorksBtn = document.getElementById("scrollToWorksBtn");
        const worksShell = document.getElementById("worksShell");

        if (toWorksBtn && worksShell) {
          toWorksBtn.addEventListener("click", () => {
            worksShell.scrollIntoView({ behavior: "smooth", block: "nearest" });
          });
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        wireButtons();
        clearSearchResultsIfEmpty();

        loadAccordion()
          .then(() => {
            wireWorksDial();
          })
          .catch(console.error);

        const searchInput = document.getElementById("chapterSearchInput");
        if (searchInput) {
          searchInput.addEventListener("input", clearSearchResultsIfEmpty);
        }
      });
    })();
  </script>
</body>
</html>
